name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t yourusername/myapp:${{ github.sha }} .

    - name: Push Docker Image
      run: docker push yourusername/myapp:${{ github.sha }}

    - name: Update Manifest Repo
      run: |
        git clone https://github.com/yourusername/myapp-manifest.git
        cd myapp-manifest
        sed -i '' "s|image:.*|image: yourusername/myapp:${{ github.sha }}|g" deployment.yaml
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git commit -am "Update image version"
        git push
